# inventory.ini
# Tells Ansible which machines to manage and how to connect to them

[streamer]
192.168.70.10 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

[endpoints]
192.168.70.11 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa
192.168.70.12 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa
192.168.70.13 ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

[all:vars]
ansible_python_interpreter=/usr/bin/python3

